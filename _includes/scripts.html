<script type="module" src="{{ base_path }}/assets/js/main.min.js"></script>

<script>
/* Mobile portrait (≤ 600px): the hamburger button toggles a separate,
   server-rendered .mobile-links dropdown. This inline script runs while
   the body is being parsed (the masthead is already in the DOM by this
   point because scripts.html is included after the page content), so
   our click listener is registered BEFORE the deferred main.min.js loads
   greedy-nav. On mobile we call stopImmediatePropagation() to keep
   greedy-nav's handler from also firing; on desktop we do nothing and
   let greedy-nav handle the click.

   IMPORTANT: do not use // line comments inside this block. Jekyll's
   compress layout strips newlines, which would turn any // comment into
   a comment that swallows the rest of the script. Use /* ... *_/ only.
   (the underscore in *_/ here is just to keep this comment intact.) */
(function () {
  /* Matches @include breakpoint(max-width $small) in _sass/_themes.scss
     ($small = 600px, converted to ems = 37.5em). */
  var MOBILE_MQ = '(max-width: 37.5em)';
  function isMobile() {
    return window.matchMedia && window.matchMedia(MOBILE_MQ).matches;
  }
  var btn = document.querySelector('#site-nav button');
  var drop = document.querySelector('#site-nav .mobile-links');
  if (!btn || !drop) return;
  btn.addEventListener('click', function (e) {
    if (!isMobile()) return;
    e.stopImmediatePropagation();
    var willOpen = drop.classList.contains('hidden');
    drop.classList.toggle('hidden', !willOpen);
    btn.classList.toggle('close', willOpen);
  }, true);
  drop.addEventListener('click', function (e) {
    if (e.target && e.target.tagName === 'A') {
      drop.classList.add('hidden');
      btn.classList.remove('close');
    }
  });
  window.addEventListener('resize', function () {
    if (!isMobile()) {
      drop.classList.add('hidden');
      btn.classList.remove('close');
    }
  });

  /* Theme toggle: bound here (vanilla JS) rather than relying on the
     jQuery handler in _main.js, because some mobile browsers were not
     firing the bubbled click reliably. We stopImmediatePropagation so
     the jQuery handler doesn't also fire and double-toggle the theme. */
  var themeAnchor = document.querySelector('#theme-toggle a');
  var themeIcon = document.getElementById('theme-icon');
  /* Fallback: if head.html didn't apply data-theme yet (e.g. a stale
     cached page from before that script was added), restore it now
     from localStorage. Also sync the icon. */
  try {
    var savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark' &&
        document.documentElement.getAttribute('data-theme') !== 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  } catch (_) {}
  if (themeIcon && document.documentElement.getAttribute('data-theme') === 'dark') {
    themeIcon.classList.remove('fa-sun');
    themeIcon.classList.add('fa-moon');
  }
  if (themeAnchor) {
    themeAnchor.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopImmediatePropagation();
      var html = document.documentElement;
      var current = html.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      try { localStorage.setItem('theme', next); } catch (_) {}
      if (next === 'dark') {
        html.setAttribute('data-theme', 'dark');
        if (themeIcon) {
          themeIcon.classList.remove('fa-sun');
          themeIcon.classList.add('fa-moon');
        }
      } else {
        html.removeAttribute('data-theme');
        if (themeIcon) {
          themeIcon.classList.remove('fa-moon');
          themeIcon.classList.add('fa-sun');
        }
      }
    });
  }
})();
</script>
